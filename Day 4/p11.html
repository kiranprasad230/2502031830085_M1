<!DOCTYPE html>
<html>
<head>
    <title>Largest of Three Numbers</title>
</head>
<body>

<h2>Find Largest of Three Numbers</h2>

<script>

let num1 = 45;
let num2 = 78;
let num3 = 32;

if(num1 > num2 && num1 > num3)
{
    document.write("Number 1 is Largest.");
}
else if(num2 > num1 && num2 > num3)
{
    document.write("Number 2 is Largest.");
}
else
{
    document.write("Number 3 is Largest.");
}

</script>

</body>
</html>
