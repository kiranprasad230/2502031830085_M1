<!DOCTYPE html>
<html>
<head>
    <title>Positive or Negative Number</title>
</head>
<body>

<h2>Check Positive or Negative Number</h2>

<script>

let num = 78;

if(num > 0)
{
    document.write("The number is Positive.");
}
else if(num < 0)
{
    document.write("The number is Negative.");
}
else
{
    document.write("The number is Zero.");
}

</script>

</body>
</html>
