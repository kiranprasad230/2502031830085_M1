<!DOCTYPE html>
<html>
<head>
    <title>Greatest of Two Numbers</title>
</head>
<body>

<h2>Find Greatest of Two Numbers</h2>

<script>

let num1 = 25;
let num2 = 50;

if(num1 > num2)
{
    document.write("Number 1 is Greatest.");
}
else
{
    document.write("Number 2 is Greatest.");
}

</script>

</body>
