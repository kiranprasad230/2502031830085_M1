<!DOCTYPE html>
<html>
<head>
    <title>Divisible by 5</title>
</head>
<body>

<h2>Check Number is Divisible by 5</h2>

<script>

let num = 6

if(num % 5 == 0)
{
    document.write("The number is divisible by 5.");
}
else
{
    document.write("The number is not divisible by 5.");
}

</script>

</body>
</html>
