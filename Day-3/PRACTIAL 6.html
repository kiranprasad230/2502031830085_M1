<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f4f4f4;
}

/* GRID CONTAINER */

.container{
    display:grid;

    grid-template-columns:2fr 1fr;

    grid-template-rows:
    80px
    150px
    150px
    150px
    80px;

    gap:10px;

    height:700px;
}

/* COMMON BOX STYLE */

.box{
    background-color: lightblue;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
    border:2px solid white;
}

/* GRID ITEMS */

.header{
    grid-column:1 / 3;
}

.content{
    grid-row:2 / 5;
}

.html{
    grid-column:2 / 3;
}

.css{
    grid-column:2 / 3;
}

.js{
    grid-column:2 / 3;
}

.footer{
    grid-column:1 / 3;
}

/* RESPONSIVE */

@media(max-width:768px){

    .container{
        grid-template-columns:1fr;
        grid-template-rows:auto;
    }

    .header,
    .content,
    .html,
    .css,
    .js,
    .footer{
        grid-column:auto;
        grid-row:auto;
    }
}

</style>
</head>

<body>

<h1 align="center">CSS Grid Layout</h1>

<div class="container">

    <div class="box header">
        HEADER
    </div>

    <div class="box content">
        CONTENT
    </div>

    <div class="box html">
        HTML
    </div>

    <div class="box css">
        CSS
    </div>

    <div class="box js">
        JS
    </div>

    <div class="box footer">
        FOOTER
    </div>

</div>

</body>
</html>
