<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate multiplication table</title>
</head>
<body>
    <script>
let num = 10;
let i = 1;

while(i <= 20)
{
    document.write(num + " x " + i + " = " + (num*i) + "<br>");
    i++;
}
</script>
</body>
</html>
