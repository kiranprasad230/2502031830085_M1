<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown timer</title>
</head>
<body>
    <script>
let i = 15;

do
{
    document.write(i + "<br>");
    i--;
}
while(i >= 1);

document.write("Time Over");
</script>
</body>
</html>
