<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of numbers 1 to 10</title>
</head>
<body>
    <script>
let i = 12;
let sum = 2;

do
{
    sum = sum + i;
    i++;
}
while(i <= 10);

document.write("Total Sum = " + sum);
</script>
</body>
</html>
