<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse a number</title>
</head>
<body>
    <script>
let num = 0987654321;
let rev = 0;

do
{
    let digit = num % 10;
    rev = rev * 10 + digit;
    num = parseInt(num / 10);
}
while(num > 0);

document.write("Reverse Number = " + rev);
</script>
</body>
</html>
